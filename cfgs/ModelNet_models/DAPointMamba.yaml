optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.001,
  weight_decay : 0.05
  }}

scheduler: {
  type: CosLR,
  kwargs: {
    epochs: 100,
    initial_epochs : 10
  }}


dataset : {
  train : { _base_: cfgs/dataset_configs/ModelNet.yaml, 
            others: {subset: 'train'},
            virtual_dataset: CRN,
            real_dataset: ModelNet},
  val : { _base_: cfgs/dataset_configs/ModelNet.yaml, 
            others: {subset: 'test'},
            virtual_dataset: CRN,
            real_dataset: ModelNet},
  test : { _base_: cfgs/dataset_configs/ModelNet.yaml, 
            others: {subset: 'test'},
            virtual_dataset: CRN,
            real_dataset: ModelNet}}

model : {
  NAME: DAPointMamba,
  group_size: 32,
  num_group: 64,
  loss: cdl2,
  points: 2048,
  mamba_config: {
    trans_dim: 384,
    encoder_dims: 384,
    depth: 16,
    drop_path_rate: 0.1,
    decoder_depth: 12
  }, 
  rms_norm: False,
  use_cls_token: False,
  drop_path: 0.1,
  drop_out: 0.,
  up_factors: [1,4,2],
  num_p0: 256,
  num_pc: 128,
  bounding: True,
  radius: 1.0,
  lambda_spatial: 0.1,
  lambda_channel: 0.1,
  order_mode: "random" #["z","z_trans"]
  }

npoints: 2048
total_bs : 32
step_per_update : 1
max_epoch : 100
consider_metric: cd_l1
consider_metric_2: CDL2
